name: Selenium Async Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 1. Levantar todo
      - name: Start Docker
        run: docker compose up -d --build

      - name: Ver contenedores
        run: docker ps

      # 2. Esperar BACKEND SERVER (IMPORTANTE)
      - name: Wait backend server
        run: |
          echo "Esperando backend-server..."
          for i in {1..60}; do
            curl -s http://localhost:8080/actuator/health && echo "OK backend" && exit 0
            sleep 2
          done
          echo "Backend-server NO disponible"
          docker logs qa-backend-server || true
          exit 1

      # 3. (OPCIONAL) verificar worker
      - name: Check worker logs
        if: always()
        run: docker logs qa-backend-worker || true

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn clean test
        env:
          BASE_URL: http://localhost:5173
          BACKEND_URL: http://localhost:8080

      # 5. Cleanup
      - name: Stop Docker
        if: always()
        run: docker compose down -v