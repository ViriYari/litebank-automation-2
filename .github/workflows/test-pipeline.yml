name: Selenium Async Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Docker ps
        run: docker ps

      - name: Wait Kafka
        run: |
          echo "Esperando Kafka..."
          for i in {1..60}; do
            docker exec qa-kafka-broker bash -c "echo > /dev/tcp/localhost/9092" && echo "Kafka OK" && exit 0
            sleep 2
          done
          echo "Kafka NO disponible"
          docker logs qa-kafka-broker || true
          exit 1

      - name: Wait backend-server
        run: |
          echo "Esperando backend..."
          for i in {1..60}; do
            curl -s http://localhost:8080/actuator/health && echo "OK backend" && exit 0
            sleep 2
          done
          docker logs qa-backend-server || true
          exit 1

      - name: Wait frontend
        run: |
          echo "Esperando frontend..."
          for i in {1..60}; do
            curl -s http://localhost:5173 | grep "<html" && echo "OK frontend" && exit 0
            sleep 2
          done
          docker logs qa-frontend || true
          exit 1

      - name: Worker logs
        if: always()
        run: docker logs qa-backend-worker || true

      - name: Run Selenium tests
        run: mvn clean test
        env:
          BASE_URL: http://localhost:5173
          BACKEND_URL: http://localhost:8080
          KAFKA_BROKER: kafka:9092

      - name: Stop Docker
        if: always()
        run: docker compose down -v