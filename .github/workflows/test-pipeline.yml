name: Selenium Async Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Levantar Docker
        run: docker compose up -d --build

      - name: Ver contenedores
        run: docker ps

      - name: Esperar frontend (IMPORTANTE)
        run: |
          echo "Esperando frontend..."
          for i in {1..30}; do
            curl -s http://localhost:5173 && break
            sleep 2
          done
          echo "Frontend no listo"
          exit 1

      - name: Ver contenedores
        run: docker ps

      - name: Ejecutar tests
        run: mvn test

      - name: Apagar Docker
        if: always()
        run: docker compose down