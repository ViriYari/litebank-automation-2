name: Selenium Async Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # =========================
      # START DOCKER
      # =========================
      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Docker ps
        run: docker ps

      # =========================
      # WAIT KAFKA (REAL HEALTH CHECK)
      # =========================
      - name: Wait for Kafka broker
        run: |
          echo "Esperando Kafka..."
          for i in {1..60}; do
            if docker exec qa-kafka-broker \
              /opt/kafka/bin/kafka-broker-api-versions.sh \
              --bootstrap-server localhost:9092 > /dev/null 2>&1; then
              echo "✓ Kafka OK"
              exit 0
            fi
            echo "  Intento $i - Kafka no listo"
            sleep 2
          done
          echo "✗ Kafka no levantó"
          docker logs qa-kafka-broker || true
          exit 1

      # =========================
      # CREATE TOPIC (FIX REAL)
      # =========================
      - name: Create Kafka topic
        run: |
          echo "Creando topic transferencias-creadas..."
          docker exec qa-kafka-broker \
            /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server localhost:9092 \
            --create \
            --if-not-exists \
            --topic transferencias-creadas \
            --partitions 1 \
            --replication-factor 1
          echo "✓ Topic creado"

      # =========================
      # WAIT BACKEND
      # =========================
      - name: Wait for backend-server
        run: |
          echo "Esperando backend-server..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "✓ Backend server OK"
              exit 0
            fi
            echo "  Intento $i - backend no listo"
            sleep 2
          done
          echo "✗ Backend no respondió"
          docker logs qa-backend-server || true
          exit 1

      # =========================
      # WAIT FRONTEND
      # =========================
      - name: Wait for frontend
        run: |
          echo "Esperando frontend..."
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              echo "✓ Frontend OK"
              exit 0
            fi
            echo "  Intento $i - frontend no listo"
            sleep 2
          done
          echo "✗ Frontend NO disponible"
          docker logs qa-frontend || true
          exit 1

      # =========================
      # WAIT WORKER (ROBUST)
      # =========================
      - name: Wait for backend-worker
        run: |
          echo "Esperando backend-worker..."
          for i in {1..30}; do
            if docker inspect -f '{{.State.Running}}' qa-backend-worker 2>/dev/null | grep -q true; then
              echo "✓ Worker running"
              # Extra wait for worker to fully connect to Kafka
              sleep 3
              exit 0
            fi
            echo "  Intento $i/30 - worker no listo"
            sleep 2
          done
          echo "✗ Worker no inició correctamente"
          docker logs qa-backend-worker || true
          exit 1

      # =========================
      # PRE-TEST VALIDATION
      # =========================
      - name: Validate backend ready for tests
        run: |
          echo "Validando que backend esté listo para recibir transferencias..."
          for i in {1..20}; do
            if curl -fsS -X POST http://localhost:8080/api/transfer \
              -H "Content-Type: application/json" \
              -d '{"target":"TEST","amount":"0.01"}' > /dev/null 2>&1; then
              echo "✓ Backend ready to accept transfers"
              # Small delay to ensure worker is processing
              sleep 2
              exit 0
            fi
            echo "  Intento $i/20 - backend processing not ready"
            sleep 1
          done
          echo "✗ Backend not accepting transfers"
          docker logs qa-backend-server | tail -20 || true
          exit 1

      # =========================
      # RUN TESTS
      # =========================
      - name: Run Selenium tests
        run: mvn clean test -X
        env:
          BASE_URL: http://localhost:5173
          BACKEND_URL: http://localhost:8080

      # =========================
      # DEBUG LOGS (on failure)
      # =========================
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Backend Server Logs ==="
          docker logs qa-backend-server || echo "No logs available"
          echo ""
          echo "=== Backend Worker Logs ==="
          docker logs qa-backend-worker || echo "No logs available"
          echo ""
          echo "=== Kafka Logs ==="
          docker logs qa-kafka-broker || echo "No logs available"
          echo ""
          echo "=== Frontend Logs ==="
          docker logs qa-frontend || echo "No logs available"
          echo ""
          echo "=== Docker Compose Status ==="
          docker compose ps
          echo ""
          echo "=== Network Status ==="
          docker network inspect qa-network || echo "Network info unavailable"

      # =========================
      # CLEANUP
      # =========================
      - name: Stop Docker
        if: always()
        run: docker compose down -v --remove-orphans