services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: qa-kafka-broker
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - qa-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: qa-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=Local-QA-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - qa-network

  kafka-init-topic:
    image: apache/kafka:3.8.0
    container_name: qa-kafka-init-topic
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/sh -c "
      echo 'Esperando Kafka...';
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
        sleep 2;
      done;

      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:29092
        --create
        --if-not-exists
        --topic transferencias-creadas
        --partitions 1
        --replication-factor 1;

      echo 'Topic listo';
      tail -f /dev/null
      "
    restart: "no"
    networks:
      - qa-network

  backend-server:
    image: node:22
    container_name: qa-backend-server
    working_dir: /app
    volumes:
      - ./backend:/app
    command: npm run start-server
    ports:
      - "8080:3000"
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - qa-network

  backend-worker:
    image: node:22
    container_name: qa-backend-worker
    working_dir: /app
    volumes:
      - ./backend:/app
    command: npm run start-worker
    environment:
      KAFKA_BROKER: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - qa-network

  frontend:
    image: node:22
    container_name: qa-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend-server
    networks:
      - qa-network

networks:
  qa-network:
    driver: bridge